<!DOCTYPE html>
<html>
<head>
    <title>Best Of All Network - Auth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4a90e2, #9013fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .box {
            background: rgba(0,0,0,0.35);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00d084;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #00b874;
        }

        #logoutBtn {
            margin-top: 20px;
            background: #ff4f4f;
            color: white;
        }

        #logoutBtn:hover {
            background: #e04444;
        }

        #msg {
            margin-top: 10px;
            color: #ffdddd;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box" id="authBox">
    <!-- Content will be injected by JS -->
</div>

<script>
    // Check if user is already logged in
    if (localStorage.getItem("loggedIn") === "true") {
        window.location.href = "/main";
    }

    const authBox = document.getElementById("authBox");

    // Check if password exists
    const savedPassword = localStorage.getItem("password");

    if (!savedPassword) {
        showSignup();
    } else {
        showLogin();
    }

    function showSignup() {
        authBox.innerHTML = `
            <h2>Create Password</h2>
            <input id="newPass" type="password" placeholder="Create a password">
            <button onclick="createPassword()">Finish</button>
            <p id="msg"></p>
        `;
    }

    function showLogin() {
        authBox.innerHTML = `
            <h2>Enter Password</h2>
            <input id="pass" type="password" placeholder="Password">
            <button onclick="login()">Sign In</button>
            <p id="msg"></p>
        `;
    }

    function createPassword() {
        const newPass = document.getElementById("newPass").value;

        if (newPass.length < 4) {
            document.getElementById("msg").innerText = "Password too short";
            return;
        }

        localStorage.setItem("password", newPass);
        localStorage.setItem("loggedIn", "true");
        window.location.href = "/main";
    }

    function login() {
        const input = document.getElementById("pass").value;
        const correct = localStorage.getItem("password");

        if (input === correct) {
            localStorage.setItem("loggedIn", "true");
            window.location.href = "/main";
        } else {
            document.getElementById("msg").innerText = "Wrong password";
        }
    }

    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.href = "/loginindex.html";
    }
</script>

</body>
</html>
