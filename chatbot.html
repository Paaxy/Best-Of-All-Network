<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenRouter AI Chatbot</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0bb7d6;
    color: #e0f7ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
    margin: 0;
  }
  .chat-container {
    background: rgba(255 255 255 / 0.1);
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  textarea {
    width: 100%;
    height: 100px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    font-size: 1rem;
    resize: vertical;
    background: rgba(255 255 255 / 0.15);
    color: #e0f7ff;
    font-family: monospace, monospace;
  }
  button {
    background: #00ffea;
    border: none;
    border-radius: 9999px;
    padding: 12px 24px;
    font-weight: 700;
    font-size: 1rem;
    color: #004d4d;
    cursor: pointer;
    align-self: flex-start;
    transition: background-color 0.3s ease;
  }
  button:hover {
    background: #00c2ff;
  }
  pre {
    background: rgba(255 255 255 / 0.15);
    border-radius: 10px;
    padding: 12px;
    white-space: pre-wrap;
    min-height: 80px;
    font-family: monospace, monospace;
    font-size: 1rem;
    color: #e0f7ff;
  }
</style>
</head>
<body>

<div class="chat-container" role="main" aria-label="OpenRouter AI Chatbot">
  <h2>OpenRouter AI Chatbot</h2>
  <textarea id="user-input" placeholder="Type your message here..."></textarea>
  <button id="send-btn" type="button">Send</button>
  <pre id="response" aria-live="polite" aria-atomic="true">AI response will appear here.</pre>
</div>

<script>
  const apiKey = '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';

  async function getAIResponse(prompt) {
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 150,
        temperature: 0.7
      })
    });

    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error?.message || 'API request failed');
    }

    const data = await response.json();
    if (data.choices && data.choices.length > 0) {
      return data.choices[0].message.content;
    } else {
      throw new Error('No response from AI');
    }
  }

  document.getElementById('send-btn').addEventListener('click', async () => {
    const inputEl = document.getElementById('user-input');
    const responseEl = document.getElementById('response');
    const prompt = inputEl.value.trim();

    if (!prompt) {
      responseEl.textContent = 'Please enter a message.';
      return;
    }

    responseEl.textContent = 'Loading...';
    try {
      const aiReply = await getAIResponse(prompt);
      responseEl.textContent = aiReply;
    } catch (error) {
      responseEl.textContent = 'Error: ' + error.message;
    }
  });
</script>

</body>
</html>
