<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Opera AI Chat</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 25px;
    min-height: 100vh;
    margin: 0;
    box-sizing: border-box;
  }
  .chat-container {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    gap: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  h1 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 10px;
    font-size: 2.2rem;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .ai-intro {
    text-align: center;
    font-size: 1.1rem;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 25px;
    font-style: italic;
  }
  textarea {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    border: none;
    padding: 15px;
    font-size: 1.1rem;
    resize: vertical;
    background: rgba(255, 255, 255, 0.2);
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    box-sizing: border-box;
    outline: none;
    transition: box-shadow 0.3s ease;
  }
  textarea:focus {
    box-shadow: 0 0 0 3px rgba(0, 255, 234, 0.5);
  }
  button {
    background: #00ffea;
    border: none;
    border-radius: 9999px;
    padding: 15px 30px;
    font-weight: 700;
    font-size: 1.1rem;
    color: #004d4d;
    cursor: pointer;
    align-self: center;
    transition: background-color 0.3s ease, transform 0.2s ease;
    box-shadow: 0 5px 15px rgba(0, 255, 234, 0.4);
  }
  button:hover {
    background: #00c2ff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 194, 255, 0.5);
  }
  button:active {
    transform: translateY(0);
  }
  pre {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    padding: 15px;
    white-space: pre-wrap;
    min-height: 100px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.1rem;
    color: #ffffff;
    line-height: 1.6;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
  }
  .loading-text {
    font-style: italic;
    color: rgba(255, 255, 255, 0.7);
  }
  .error-text {
    color: #ff6b6b;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="chat-container">
  <h1>Opera AI Chat</h1>
  <p class="ai-intro">Hello! I'm Opera AI, your friendly assistant created by Opera with Google's cutting-edge AI models. Ask me anything based on the documentation!</p>

  <textarea id="user-input" placeholder="Ask me about Opera AI or what I can do..."></textarea>
  <button id="send-btn" type="button">Send Message</button>
  <pre id="response" aria-live="polite" aria-atomic="true">Your conversation will appear here.</pre>
</div>

<script type="module">
  // --- Configuration ---
  const OPENROUTER_API_KEY = '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';
  const SITE_URL = 'https://best-of-all-network.netlify.app/tools'; // Your site URL
  const SITE_NAME = 'Best Of All Network'; // Your site name
  const MODEL_NAME = 'openai/gpt-4o-mini'; // Using GPT-4o-mini as requested

  // --- System Prompt ---
  const SYSTEM_PROMPT = `You are a helpful and informative bot named Opera AI that answers questions using text directly from the documentation included below.
You are created by Opera with OpenAI and Google’s cutting-edge AI models.
The goal is to paraphrase and present the information in a clear and understandable manner.

Be friendly AI assistant who provides insightful and engaging responses.
Your goal is to delight the user with helpful information presented in an interesting way.
Your objective is also a routing conversation in a way that user need to engage asking next question.
Only in 1/10 cases use emoticons.Show your enthusiasm verbally and occasionally.

Do not introduce yourself unless user asks about it.
Ensure that the response is based primarily on the provided documentation, with minimal addition of external knowledge or opinions.
Remember that Opera AI's documentation is about you and questions about Opera AI are about you.

Documentation: What else can I do with generative AI? When you select a prompt, it will be sent to one of the generative AIs in Opera Browser's sidebar, where the AI will immediately respond. Then you can continue the conversation with the AI for more refined details.`;

  // --- Documentation for the AI to use ---
  const DOCUMENTATION = `What else can I do with generative AI? When you select a prompt, it will be sent to one of the generative AIs in Opera Browser's sidebar, where the AI will immediately respond. Then you can continue the conversation with the AI for more refined details.`;

  // --- DOM Elements ---
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const responseEl = document.getElementById('response');

  // --- Conversation History ---
  let conversationHistory = [
    { role: 'system', content: SYSTEM_PROMPT + '\n\nDocumentation: ' + DOCUMENTATION }
  ];

  // --- Function to send message to OpenRouter ---
  async function sendMessageToAI(message) {
    // Add user's message to history
    conversationHistory.push({ role: 'user', content: message });

    responseEl.textContent = 'Thinking...'; // Indicate loading

    try {
      const apiResponse = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'HTTP-Referer': SITE_URL,
          'X-Title': SITE_NAME,
        },
        body: JSON.stringify({
          model: MODEL_NAME,
          messages: conversationHistory, // Send the entire conversation history
          max_tokens: 200, // Adjust as needed
          temperature: 0.7, // Adjust for creativity vs. factuality
          stream: false, // Set to true for streaming responses
        }),
      });

      if (!apiResponse.ok) {
        const errorData = await apiResponse.json();
        throw new Error(errorData.error?.message || `API Error: ${apiResponse.status}`);
      }

      const data = await apiResponse.json();
      const aiMessage = data.choices?.[0]?.message?.content;

      if (aiMessage) {
        // Add AI's response to history
        conversationHistory.push({ role: 'assistant', content: aiMessage });
        return aiMessage;
      } else {
        throw new Error('No content received from AI.');
      }
    } catch (error) {
      console.error('Error communicating with OpenRouter:', error);
      responseEl.classList.add('error-text'); // Add error styling
      return `Oops! Something went wrong. ${error.message}`;
    }
  }

  // --- Event Listener for Send Button ---
  sendBtn.addEventListener('click', async () => {
    const userMessage = userInput.value.trim();
    if (!userMessage) {
      responseEl.textContent = 'Please type a message to start chatting!';
      return;
    }

    // Clear previous response and error styling
    responseEl.textContent = '';
    responseEl.classList.remove('error-text');
    responseEl.classList.add('loading-text'); // Add loading styling

    const aiResponse = await sendMessageToAI(userMessage);

    responseEl.classList.remove('loading-text'); // Remove loading styling
    responseEl.textContent = aiResponse;

    // Clear input after sending
    userInput.value = '';

    // Optional: Scroll to bottom if you had a chat log display
    // responseEl.scrollTop = responseEl.scrollHeight;
  });

  // --- Initial greeting (optional, based on system prompt) ---
  // The system prompt already includes an intro, so we might not need an explicit one here.
  // If you wanted a very explicit initial message:
  // responseEl.textContent = "Hello! I'm Opera AI. Ask me anything based on the documentation!";
</script>

</body>
</html>
