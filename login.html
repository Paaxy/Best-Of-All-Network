<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="canonical" href="https://best-of-all-network.netlify.app/login" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Login - Best Of All - NETWORK</title>
    <meta name="description" content="Sign in to Best Of All - NETWORK to access your account.">
    <meta name="keywords" content="login, sign in, account, Best Of All, NETWORK">
    <meta name="author" content="Best Of All - NETWORK Team and Co">
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="login.html.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="main.html">
                    <img src="logo.png" alt="Best Of All - NETWORK Logo" class="login-logo" width="80" height="80">
                </a>
                <h1>Welcome Back</h1>
                <p class="login-subtitle">Sign in to Best Of All - NETWORK</p>
            </div>

            <div class="auth-providers">
                <button class="auth-btn google-btn" onclick="loginWithProvider('google')">
                    <svg class="auth-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <button class="auth-btn github-btn" onclick="loginWithProvider('github')">
                    <svg class="auth-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                    Continue with GitHub
                </button>
            </div>

            <div class="divider">
                <span>or sign in with email</span>
            </div>

            <div id="email-form" class="email-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
                <button class="auth-btn email-btn" onclick="loginWithEmail()">
                    Sign In
                </button>
                <p class="signup-link">
                    Don't have an account? <a href="#" onclick="showSignup(event)">Sign up</a>
                </p>
            </div>

            <div id="signup-form" class="email-form" style="display: none;">
                <div class="form-group">
                    <label for="signup-email">Email address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password">
                </div>
                <button class="auth-btn email-btn" onclick="signupWithEmail()">
                    Create Account
                </button>
                <p class="signup-link">
                    Already have an account? <a href="#" onclick="showLogin(event)">Sign in</a>
                </p>
            </div>

            <div id="auth-message" class="auth-message" style="display: none;"></div>
        </div>

        <a href="main.html" class="back-link">Back to Home</a>
    </div>

    <script>
        const identity = netlifyIdentity;

        // Initialize Netlify Identity
        identity.init();

        // Check if user is already logged in
        const user = identity.currentUser();
        if (user) {
            window.location.href = '/main.html';
        }

        // Listen for login events
        identity.on('login', function(user) {
            showMessage('Signed in successfully! Redirecting...', 'success');
            setTimeout(function() {
                window.location.href = '/main.html';
            }, 1000);
        });

        identity.on('signup', function(user) {
            showMessage('Account created! Please check your email to confirm.', 'success');
        });

        identity.on('error', function(err) {
            showMessage(err.message || 'An error occurred. Please try again.', 'error');
        });

        function loginWithProvider(provider) {
            identity.open(provider);
        }

        function loginWithEmail() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Please enter your email and password.', 'error');
                return;
            }

            identity.login(email, password, true)
                .then(function(user) {
                    showMessage('Signed in successfully! Redirecting...', 'success');
                    setTimeout(function() {
                        window.location.href = '/main.html';
                    }, 1000);
                })
                .catch(function(err) {
                    showMessage(err.message || 'Invalid email or password.', 'error');
                });
        }

        function signupWithEmail() {
            var email = document.getElementById('signup-email').value;
            var password = document.getElementById('signup-password').value;

            if (!email || !password) {
                showMessage('Please enter your email and password.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }

            identity.signup(email, password)
                .then(function(user) {
                    showMessage('Account created! Please check your email to confirm.', 'success');
                })
                .catch(function(err) {
                    showMessage(err.message || 'Could not create account.', 'error');
                });
        }

        function showSignup(e) {
            e.preventDefault();
            document.getElementById('email-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            hideMessage();
        }

        function showLogin(e) {
            e.preventDefault();
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('email-form').style.display = 'block';
            hideMessage();
        }

        function showMessage(text, type) {
            var msg = document.getElementById('auth-message');
            msg.textContent = text;
            msg.className = 'auth-message ' + type;
            msg.style.display = 'block';
        }

        function hideMessage() {
            document.getElementById('auth-message').style.display = 'none';
        }

        // Allow Enter key to submit forms
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginWithEmail();
        });
        document.getElementById('signup-password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') signupWithEmail();
        });
    </script>
</body>
</html>
