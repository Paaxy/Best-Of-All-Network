<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="canonical" href="https://best-of-all-network.netlify.app/login" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <title>Login • Best Of All – NETWORK</title>

    <meta name="description" content="Sign in to Best Of All – NETWORK to access your account and personalized features.">
    <meta name="keywords" content="Best Of All Network login, sign in, account access">
    <meta name="author" content="Best Of All – NETWORK Team">

    <link rel="icon" type="image/png" href="logo.png">

    <!-- Styles -->
    <link rel="stylesheet" href="animations.css">
    <link rel="stylesheet" href="login.html.css">

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
    <main class="login-container">
        <section class="login-card">

            <!-- Header -->
            <header class="login-header">
                <a href="main.html" aria-label="Return to homepage">
                    <img src="logo.png" alt="Best Of All – NETWORK Logo" class="login-logo" width="80" height="80">
                </a>
                <h1>Welcome Back</h1>
                <p class="login-subtitle">Sign in to continue</p>
            </header>

            <!-- OAuth Providers -->
            <div class="auth-providers">
                <button class="auth-btn google-btn" onclick="loginWithProvider('google')" aria-label="Sign in with Google">
                    <svg class="auth-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <button class="auth-btn github-btn" onclick="loginWithProvider('github')" aria-label="Sign in with GitHub">
                    <svg class="auth-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385..."/>
                    </svg>
                    Continue with GitHub
                </button>
            </div>

            <!-- Divider -->
            <div class="divider"><span>or sign in with email</span></div>

            <!-- Email Login Form -->
            <form id="email-form" class="email-form" onsubmit="event.preventDefault(); loginWithEmail();">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>

                <button class="auth-btn email-btn" type="submit">Sign In</button>

                <p class="signup-link">
                    Don't have an account?
                    <a href="#" onclick="showSignup(event)">Sign up</a>
                </p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="email-form" style="display:none;" onsubmit="event.preventDefault(); signupWithEmail();">
                <div class="form-group">
                    <label for="signup-email">Email address</label>
                    <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password" required>
                </div>

                <button class="auth-btn email-btn" type="submit">Create Account</button>

                <p class="signup-link">
                    Already have an account?
                    <a href="#" onclick="showLogin(event)">Sign in</a>
                </p>
            </form>

        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
