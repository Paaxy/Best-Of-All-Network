<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BOAN – Trending News</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Basic styling (you can customize in style.css) -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 2px solid #333;
    }

    #news-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .news-card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
      transition: 0.2s;
    }

    .news-card:hover {
      transform: scale(1.02);
      border-color: #555;
    }

    .news-image {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .original {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .rephrased {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 20px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <header>🔥 BOAN – Trending News</header>

  <div id="news-container">
    <div class="loading">Loading news…</div>
  </div>

  <script src="app.js"></script>
  <script src="newsserver.js"></script>
  <script>fetch("/api/news")
  .then(res => res.json())
  .then(data => {
    console.log(data);
  });
</script>
</body>
</html>
