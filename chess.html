<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Pro Chess • Best Of All Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ffea; }
        body { background: #001a2a url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        h1 { font-family: 'Space Grotesk'; color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        #board { display: grid; grid-template-columns: repeat(8, 65px); grid-template-rows: repeat(8, 65px); border: 8px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .square { width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; cursor: pointer; background-size: 50px; background-repeat: no-repeat; background-position: center; }
        .white { background-color: #dee3e6; }
        .black { background-color: #8ca2ad; }
        .selected { background-color: #ffeb3b !important; }
        .status { margin-top: 20px; padding: 10px 30px; border-radius: 30px; background: rgba(0, 194, 255, 0.2); border: 1px solid var(--accent); }
    </style>
</head>
<body>
    <h1>CHESS PRO</h1>
    <div id="board"></div>
    <div class="status" id="status">White's Turn</div>
    <script>
        const piecesImg = {
            'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
            'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
            'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg',
            'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg',
            'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
            'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg',
            'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
            'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
            'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg',
            'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg',
            'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
            'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg'
        };
        let board = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
        let sel = null, turn = 'white';
        function draw() {
            const b = document.getElementById('board'); b.innerHTML = '';
            board.forEach((row, r) => row.forEach((p, c) => {
                const s = document.createElement('div');
                s.className = `square ${(r+c)%2==0?'white':'black'} ${sel && sel[0]==r && sel[1]==c ? 'selected':''}`;
                if(p) s.style.backgroundImage = `url(${piecesImg[p]})`;
                s.onclick = () => {
                    if(sel) {
                        board[r][c] = board[sel[0]][sel[1]]; board[sel[0]][sel[1]] = '';
                        sel = null; turn = turn=='white'?'black':'white';
                        document.getElementById('status').innerText = turn.toUpperCase() + " Turn";
                    } else if(p && ((turn=='white' && p==p.toUpperCase()) || (turn=='black' && p==p.toLowerCase()))) sel = [r,c];
                    draw();
                };
                b.appendChild(s);
            }));
        }
        draw();
    </script>
</body>
</html>
