<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Grandmaster Chess • Best Of All</title>
    <style>
        body { background: #001a2a url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 10px solid #222; box-shadow: 0 0 50px rgba(0,194,255,0.3); }
        .sq { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer; background-size: 50px; background-repeat: no-repeat; background-position: center; }
        .w { background-color: #dee3e6; } .b { background-color: #8ca2ad; }
        .sel { background-color: #00ffea !important; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        .status { margin-top: 20px; font-weight: bold; padding: 10px 20px; border: 1px solid #00ffea; border-radius: 20px; }
    </style>
</head>
<body>
    <h1 style="color:#00ffea">CHESS vs AI BOT</h1>
    <div id="board"></div>
    <div class="status" id="status">Your Turn (White)</div>
    <script>
        const piecesImg = {
            'p':'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg','r':'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg','n':'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg','b':'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg','q':'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg','k':'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
            'P':'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg','R':'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg','N':'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg','B':'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg','Q':'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg','K':'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg'
        };
        let board = [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];
        let sel = null;

        function isBot(p) { return p && p === p.toLowerCase(); }
        function isPlayer(p) { return p && p === p.toUpperCase(); }

        function botMove() {
            let moves = [];
            for(let r=0;r<8;r++) for(let c=0;c<8;c++) {
                if(isBot(board[r][c])) {
                    for(let nr=0;nr<8;nr++) for(let nc=0;nc<8;nc++) {
                        if(!isBot(board[nr][nc])) { // Can't capture own
                            let score = isPlayer(board[nr][nc]) ? 10 : 0;
                            moves.push({f:[r,c], t:[nr,nc], s:score + Math.random()});
                        }
                    }
                }
            }
            moves.sort((a,b) => b.s - a.s);
            let m = moves[0];
            board[m.t[0]][m.t[1]] = board[m.f[0]][m.f[1]]; board[m.f[0]][m.f[1]] = '';
            draw(); document.getElementById('status').innerText = "Your Turn";
        }

        function draw() {
            const bEl = document.getElementById('board'); bEl.innerHTML = '';
            board.forEach((row, r) => row.forEach((p, c) => {
                const s = document.createElement('div');
                s.className = `sq ${(r+c)%2==0?'w':'b'} ${sel && sel[0]==r && sel[1]==c?'sel':''}`;
                if(p) s.style.backgroundImage = `url(${piecesImg[p]})`;
                s.onclick = () => {
                    if(sel) {
                        if(isPlayer(board[r][c])) { sel = [r,c]; draw(); return; } // Switch selection
                        board[r][c] = board[sel[0]][sel[1]]; board[sel[0]][sel[1]] = '';
                        sel = null; draw(); document.getElementById('status').innerText = "Bot thinking...";
                        setTimeout(botMove, 600);
                    } else if(isPlayer(board[r][c])) { sel = [r,c]; draw(); }
                };
                bEl.appendChild(s);
            }));
        }
        draw();
    </script>
</body>
</html>
