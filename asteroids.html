<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Deep Space Hunter</title>
    <style>
        body { margin:0; background: #000 url('https://www.transparenttextures.com/patterns/stardust.png'); overflow:hidden; }
        #s { position:absolute; color:#00ffea; font-family:sans-serif; top:10px; left:10px; }
    </style>
</head>
<body>
    <div id="s">Score: 0 | WATCH OUT FOR RED HUNTERS</div>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        let w, h, ship = {x:0, y:0, r:0, vx:0, vy:0}, roids = [], bullets = [], keys = {};
        function resize() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; ship.x=w/2; ship.y=h/2; }
        resize();
        function spawn(isHunter) { 
            roids.push({x:Math.random()*w, y:Math.random()*h, vx:Math.random()*2-1, vy:Math.random()*2-1, sz:25, hunter:isHunter}); 
        }
        for(let i=0; i<5; i++) spawn(i === 0);
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => { keys[e.code]=false; if(e.code=='Space') bullets.push({x:ship.x, y:ship.y, vx:Math.cos(ship.r)*5, vy:Math.sin(ship.r)*5, t:60}); };
        function update() {
            ctx.clearRect(0,0,w,h);
            if(keys['ArrowLeft']) ship.r-=0.1; if(keys['ArrowRight']) ship.r+=0.1;
            if(keys['ArrowUp']) { ship.vx+=Math.cos(ship.r)*0.1; ship.vy+=Math.sin(ship.r)*0.1; }
            ship.x=(ship.x+ship.vx+w)%w; ship.y=(ship.y+ship.vy+h)%h;
            ctx.strokeStyle='#00ffea'; ctx.beginPath(); ctx.arc(ship.x, ship.y, 10, ship.r-2.5, ship.r+2.5); ctx.stroke();
            roids.forEach((r, i) => {
                if(r.hunter) { r.vx += (ship.x - r.x)*0.001; r.vy += (ship.y - r.y)*0.001; } // AI Logic: Follow Player
                r.x=(r.x+r.vx+w)%w; r.y=(r.y+r.vy+h)%h;
                ctx.strokeStyle = r.hunter ? 'red' : 'white';
                ctx.beginPath(); ctx.arc(r.x, r.y, r.sz, 0, 7); ctx.stroke();
            });
            bullets.forEach((b, i) => {
                b.x+=b.vx; b.y+=b.vy; b.t--;
                ctx.fillStyle='white'; ctx.fillRect(b.x, b.y, 2, 2);
                roids.forEach((r, ri) => {
                    if(Math.hypot(b.x-r.x, b.y-r.y) < r.sz) { roids.splice(ri, 1); spawn(r.hunter); bullets.splice(i, 1); }
                });
            });
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
