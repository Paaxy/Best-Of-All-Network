<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Snake Jungle</title>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { border: 10px solid #2e7d32; box-shadow: 0 0 20px rgba(0,0,0,0.8); background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); }
    </style>
</head>
<body>
    <h1>Score: <span id="s">0</span></h1>
    <canvas id="g" width="400" height="400"></canvas>
    <script>
        const c = document.getElementById('g'), ctx = c.getContext('2d');
        const grass = new Image(); grass.src = 'https://img.freepik.com/free-photo/green-grass-texture_1249-15.jpg';
        let x=10, y=10, xv=0, yv=0, tx=15, ty=15, gs=20, tc=20, trail=[], tail=5, score=0;
        function game() {
            x+=xv; y+=yv; if(x<0)x=tc-1; if(x>tc-1)x=0; if(y<0)y=tc-1; if(y>tc-1)y=0;
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,c.width,c.height);
            ctx.strokeStyle = "#2e7d32";
            for(let i=0; i<trail.length; i++) {
                ctx.fillStyle = i == trail.length-1 ? "#4CAF50" : "#2E7D32";
                ctx.fillRect(trail[i].x*gs, trail[i].y*gs, gs-1, gs-1);
                if(trail[i].x==x && trail[i].y==y && (xv||yv)) { tail=5; score=0; }
            }
            trail.push({x:x,y:y}); while(trail.length>tail) trail.shift();
            if(tx==x && ty==y) { tail++; score++; tx=Math.floor(Math.random()*tc); ty=Math.floor(Math.random()*tc); }
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(tx*gs+gs/2, ty*gs+gs/2, gs/2-2, 0, 7); ctx.fill();
            document.getElementById('s').innerText = score;
        }
        window.onkeydown = e => { 
            if(e.key=="ArrowLeft" && xv!=1) {xv=-1; yv=0} if(e.key=="ArrowUp" && yv!=1) {xv=0; yv=-1}
            if(e.key=="ArrowRight" && xv!=-1) {xv=1; yv=0} if(e.key=="ArrowDown" && yv!=-1) {xv=0; yv=1}
        };
        setInterval(game, 100);
    </script>
</body>
</html>
