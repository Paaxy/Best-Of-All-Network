<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Snake Bot • Pro</title>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; color: #00ffea; font-family: sans-serif; }
        canvas { border: 5px solid #00ffea; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); box-shadow: 0 0 20px #00ffea; }
    </style>
</head>
<body>
    <h1>SNAKE BOT <small>(Press 'B' to toggle AI)</small></h1>
    <canvas id="g" width="400" height="400"></canvas>
    <script>
        const c = document.getElementById('g'), ctx = c.getContext('2d');
        let x=10, y=10, xv=0, yv=0, ax=15, ay=15, gs=20, tc=20, trail=[], tail=5, auto=false;
        window.onkeydown = e => {
            if(e.key=='b') auto = !auto;
            if(!auto) {
                if(e.key=="ArrowLeft") {xv=-1; yv=0} if(e.key=="ArrowUp") {xv=0; yv=-1}
                if(e.key=="ArrowRight") {xv=1; yv=0} if(e.key=="ArrowDown") {xv=0; yv=1}
            }
        };
        function step() {
            if(auto) {
                if(x < ax) {xv=1; yv=0} else if(x > ax) {xv=-1; yv=0}
                else if(y < ay) {xv=0; yv=1} else if(y > ay) {xv=0; yv=-1}
            }
            x+=xv; y+=yv; if(x<0)x=tc-1; if(x>tc-1)x=0; if(y<0)y=tc-1; if(y>tc-1)y=0;
            ctx.fillStyle="black"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle="#00ffea";
            trail.forEach(t => ctx.fillRect(t.x*gs, t.y*gs, gs-2, gs-2));
            trail.push({x:x,y:y}); while(trail.length>tail) trail.shift();
            if(ax==x && ay==y) { tail++; ax=Math.floor(Math.random()*tc); ay=Math.floor(Math.random()*tc); }
            ctx.fillStyle="red"; ctx.fillRect(ax*gs, ay*gs, gs-2, gs-2);
        }
        setInterval(step, 100);
    </script>
</body>
</html>
