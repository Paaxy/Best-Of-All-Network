<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Chatroom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #fff;
            border: 1px solid #ccc;
        }
        #message-input {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ccc;
        }
        #message-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
        }
        #message-input button {
            padding: 10px;
        }
        #room-panel, #signup-panel {
            padding: 10px;
            background: #fff;
            border: 1px solid #ccc;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div id="message-input">
            <input type="text" id="message" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div id="signup-panel">
            <input type="text" id="username" placeholder="Enter your username" />
            <button onclick="signUp()">Sign Up</button>
            <p id="signup-message"></p>
        </div>
        <div id="room-panel">
            <input type="text" id="room-code" placeholder="Enter room code" />
            <button onclick="joinRoom()">Join Room</button>
            <button onclick="createRoom()">Create Room</button>
            <p id="room-message"></p>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('message');
        const roomCodeInput = document.getElementById('room-code');
        const roomMessage = document.getElementById('room-message');
        const usernameInput = document.getElementById('username');
        const signupMessage = document.getElementById('signup-message');

        let currentRoom = 'global';
        const rooms = {};
        let username = '';

        function updateMessages(msg) {
            const msgElement = document.createElement('div');
            msgElement.textContent = msg;
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value;
            if (message && username) {
                updateMessages(`[${currentRoom}] ${username}: ${message}`);
                messageInput.value = '';
            } else {
                alert('Please enter a message and ensure you are signed up.');
            }
        }

        function signUp() {
            const name = usernameInput.value.trim();
            if (name) {
                username = name;
                signupMessage.textContent = `Signed up as: ${username}`;
                usernameInput.value = '';
            } else {
                signupMessage.textContent = 'Please enter a valid username.';
            }
        }

        function createRoom() {
            const roomCode = Math.random().toString(36).substring(2, 8);
            rooms[roomCode] = [];
            roomMessage.textContent = `Room created! Code: ${roomCode}`;
        }

        function joinRoom() {
            const roomCode = roomCodeInput.value;
            if (rooms[roomCode]) {
                currentRoom = roomCode;
                roomMessage.textContent = `Joined room: ${currentRoom}`;
            } else {
                roomMessage.textContent = 'Room does not exist.';
            }
            roomCodeInput.value = '';
        }
    </script>
</body>
</html>
