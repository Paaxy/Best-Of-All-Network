<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Neon Tic-Tac-Toe</title>
    <style>
        body { background: #050505 url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); display: flex; flex-direction: column; align-items: center; font-family: 'Space Grotesk', sans-serif; height: 100vh; justify-content: center; margin:0; }
        .grid { display: grid; grid-template-columns: repeat(3, 120px); gap: 15px; }
        .cell { width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 4rem; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; }
        .cell:hover { background: rgba(0, 194, 255, 0.1); }
        .x { color: #00c2ff; text-shadow: 0 0 20px #00c2ff; }
        .o { color: #ff00ea; text-shadow: 0 0 20px #ff00ea; }
    </style>
</head>
<body>
    <div class="grid" id="g"></div>
    <script>
        let s = Array(9).fill(""), turn = "X";
        function check() {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) if(s[p[0]] && s[p[0]]==s[p[1]] && s[p[0]]==s[p[2]]) return s[p[0]];
            return s.includes("") ? null : "Tie";
        }
        function draw() {
            const g = document.getElementById('g'); g.innerHTML = '';
            s.forEach((v, i) => {
                const d = document.createElement('div'); d.className = `cell ${v.toLowerCase()}`; d.textContent = v;
                d.onclick = () => { if(!v && !check()) { s[i]=turn; turn=turn=="X"?"O":"X"; draw(); let res=check(); if(res) setTimeout(()=>alert(res=="Tie"?"Draw!":res+" Wins!"),100); } };
                g.appendChild(d);
            });
        }
        draw();
    </script>
</body>
</html>
