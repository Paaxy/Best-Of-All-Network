<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Unbeatable AI Tic-Tac-Toe</title>
    <style>
        body { background: #00a6ff; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 50px; }
        .cell { width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 2px solid #00ffea; border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 3rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Impossible Bot</h1>
    <div class="grid" id="g"></div>
    <script>
        let b = Array(9).fill(null);
        function check(board) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) if(board[l[0]] && board[l[0]]==board[l[1]] && board[l[0]]==board[l[2]]) return board[l[0]];
            return board.includes(null) ? null : 'T';
        }
        function minimax(board, isMax) {
            let res = check(board);
            if(res=='O') return 1; if(res=='X') return -1; if(res=='T') return 0;
            let scores = [];
            for(let i=0; i<9; i++) if(!board[i]) {
                board[i] = isMax ? 'O' : 'X';
                scores.push(minimax(board, !isMax));
                board[i] = null;
            }
            return isMax ? Math.max(...scores) : Math.min(...scores);
        }
        function bot() {
            let best = -Infinity, move;
            for(let i=0; i<9; i++) if(!b[i]) {
                b[i]='O'; let score = minimax(b, false); b[i]=null;
                if(score > best) { best = score; move = i; }
            }
            b[move]='O'; draw();
        }
        function draw() {
            const g = document.getElementById('g'); g.innerHTML = '';
            b.forEach((v, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.textContent = v;
                d.onclick = () => { if(!v && !check(b)) { b[i]='X'; draw(); if(!check(b)) setTimeout(bot, 400); } };
                g.appendChild(d);
            });
        }
        draw();
    </script>
</body>
</html>
