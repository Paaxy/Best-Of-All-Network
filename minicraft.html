<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MiniCraft Web</title>
  <link rel="stylesheet" href="minicraft.html.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;
}

#renderCanvas {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="inventory"></div>
  <div id="selectedLabel">Selected: grass</div>
  <div id="crosshair"></div>
  <div id="mobileControls">
    <div id="joystick"></div>
    <button id="jumpBtn">Jump</button>
    <button id="placeBtn">Place</button>
  </div>
  
  <button id="fullscreenBtn" style="
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 10px 16px;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  z-index: 1000;
">
  ⛶ Fullscreen
</button>
<script>
  const canvas = document.getElementById("renderCanvas");

  // Resize the engine when the window or fullscreen changes
  function resizeCanvas() {
    if (engine) {
      engine.resize();
    }
  }

  // Listen for fullscreen changes
  document.addEventListener("fullscreenchange", resizeCanvas);
  document.addEventListener("webkitfullscreenchange", resizeCanvas);
  document.addEventListener("mozfullscreenchange", resizeCanvas);
  document.addEventListener("MSFullscreenChange", resizeCanvas);

  // Also resize on window resize
  window.addEventListener("resize", resizeCanvas);
</script>


  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/cannon.js"></script>
  <script src="minicraft.html.terrains.js"></script>
  <script src="minicraft.html.controls.js"></script>
  <script src="minicraft.html.js"></script>
</body>
</html>
